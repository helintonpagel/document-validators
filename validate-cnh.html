<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Validar CNH</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 flex items-center justify-center min-h-screen text-gray-800">
    <main class="bg-white p-8 rounded-xl shadow-lg max-w-sm w-full">
      <h1 class="text-2xl font-bold mb-6 text-center text-blue-900">Validar CNH</h1>
      <form class="space-y-5" id="cnh-form">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1" for="cnh">CNH:</label>
          <input
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors"
            id="cnh"
            type="text"
            name="cnh"
            required=""
            inputmode="numeric"
            pattern="[\d\.\-]*"
            placeholder="Ex: 000000000-00"
          />
        </div>
        <button
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
          type="submit"
        >
          Validar
        </button>
      </form>
      <div class="mt-6 text-center min-h-[1.5rem]">
        <p class="font-bold text-lg transition-all" id="cnh-result" aria-live="polite">&nbsp;</p>
      </div>
      <div class="mt-6">
        <a href="index.html" class="text-blue-700 hover:underline transition-colors">Validar CPF</a>
      </div>
    </main>
    <script type="module">
      import { validateCnh } from "./index.js";

      const form = document.getElementById("cnh-form");
      const result = document.getElementById("cnh-result");

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        if (validateCnh(form.cnh.value)) {
          result.textContent = "✅ CNH válida";
          result.style.color = "green";
        } else {
          result.textContent = "❌ CNH inválida";
          result.style.color = "red";
        }

        result.textContent += `: ${form.cnh.value}`;
      });
    </script>
  </body>
</html>
